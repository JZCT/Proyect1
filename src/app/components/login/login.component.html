<div class="login-card">
  <div class="page-title-group">
    <h2 class="page-title">Iniciar Sesion</h2>
    <p class="page-subtitle">Ingresa tu correo y contrasena para acceder al panel.</p>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="login()">
    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        formControlName="email"
        placeholder="correo@ejemplo.com"
        class="form-control"
        [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
      />
      <div class="invalid-feedback" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <span *ngIf="loginForm.get('email')?.errors?.['required']">El email es requerido</span>
        <span *ngIf="loginForm.get('email')?.errors?.['email']">Email invalido</span>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Contrasena</label>
      <input
        type="password"
        id="password"
        formControlName="password"
        placeholder="********"
        class="form-control"
        [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
      />
      <div class="invalid-feedback" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        <span *ngIf="loginForm.get('password')?.errors?.['required']">La contrasena es requerida</span>
        <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Minimo 6 caracteres</span>
      </div>
    </div>

    <button type="button" class="btn-link" [disabled]="loading" (click)="recoverPassword()">
      Olvide mi contrasena
    </button>

    <p class="login-hint login-hint--warning" *ngIf="loginLockMessage">
      {{ loginLockMessage }}
    </p>

    <button type="submit" class="btn-submit" [disabled]="!canSubmitLogin">
      {{ loading ? 'Cargando...' : 'Entrar' }}
    </button>
  </form>
</div>
