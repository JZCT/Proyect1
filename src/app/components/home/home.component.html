<div class="home-page">
  <section class="welcome-card">
    <div class="page-title-group">
      <h2 class="page-title">{{ title }}</h2>
      <p class="page-subtitle">{{ description }}</p>
    </div>
    <p class="hint-chip">Interfaz simple: primero selecciona modulo, luego usa el buscador.</p>
  </section>

  <section class="modules">
    <h3>Vistas principales</h3>
    <div class="modules-grid">
      <article class="module-card" *ngFor="let module of visibleModules">
        <h4>{{ module.title }}</h4>
        <p>{{ module.description }}</p>
        <a [routerLink]="module.route">Abrir vista</a>
      </article>
    </div>
  </section>
</div>
