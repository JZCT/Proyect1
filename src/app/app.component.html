<div class="layout">
  <header class="app-header" *ngIf="!isLoginPage && !isEmbedMode">
    <div class="app-header__inner">
      <div class="brand">
        <h1>{{ title }}</h1>
        <p>Operacion diaria simple para cursos, personas e instructores</p>
      </div>

      <nav *ngIf="currentUser$ | async as user; else guestLinks" class="app-nav">
        <a *ngIf="user.role !== 'instructor'" routerLink="/home" routerLinkActive="active">Home</a>
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Cursos y Personas</a>
        <a *ngIf="user.role !== 'instructor'" routerLink="/cursos" routerLinkActive="active">Cursos</a>
        <a *ngIf="user.role === 'admin' || user.role === 'instructor'" routerLink="/personas" routerLinkActive="active">Personas</a>
        <a *ngIf="user.role === 'admin'" routerLink="/instructores" routerLinkActive="active">Instructores</a>
        <a *ngIf="user.role === 'admin'" routerLink="/usuario" routerLinkActive="active">Usuarios</a>

        <div class="user-block">
          <span>{{ user.nombre || user.email }}</span>
          <small class="role-badge">{{ user.role || 'user' }}</small>
          <button class="btn-logout" (click)="logout()">Salir</button>
        </div>
      </nav>

      <ng-template #guestLinks>
        <nav class="app-nav">
          <a routerLink="/login" class="active">Login</a>
        </nav>
      </ng-template>
    </div>
  </header>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer" *ngIf="!isLoginPage && !isEmbedMode">
    <p>&copy; 2026 CecaptaINS</p>
  </footer>
</div>

<app-notification-center></app-notification-center>
